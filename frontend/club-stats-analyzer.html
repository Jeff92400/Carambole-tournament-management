<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyse Statistiques Clubs</title>
  <link rel="stylesheet" href="css/styles.css?v=2">
  <style>
    .club-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }

    .club-name {
      font-size: 18px;
      font-weight: 700;
      color: #1F4788;
      margin-bottom: 10px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-top: 10px;
    }

    .stat-box {
      background: #f8f9fa;
      padding: 10px;
      border-radius: 4px;
      text-align: center;
    }

    .stat-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 700;
      color: #1F4788;
    }

    .medal-counts {
      display: flex;
      gap: 15px;
      margin-top: 8px;
    }

    .medal-count {
      font-size: 14px;
    }

    .highlight {
      background: #fff3cd;
      border: 2px solid #ffc107;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="navbar">
      <h2>
        <img src="images/FrenchBillard-Icon-small.png" alt="" style="height: 48px; width: 48px; vertical-align: middle; margin-right: 8px;">
        Analyse Stats Clubs
      </h2>
      <div class="nav-links">
        <a href="statistiques.html">← Retour aux stats</a>
        <a href="dashboard.html">Tableau de bord</a>
      </div>
    </div>

    <div id="errorMessage" class="error" style="display: none;"></div>

    <div class="card">
      <h3>🏅 Analyse Détaillée des Podiums par Club</h3>

      <div style="margin-bottom: 20px;">
        <label for="seasonSelect" style="font-weight: 600; margin-right: 10px;">Saison :</label>
        <select id="seasonSelect" style="padding: 8px 15px; border: 1px solid #ddd; border-radius: 8px;">
          <!-- Options populated dynamically -->
        </select>
        <button onclick="loadData()" class="btn" style="margin-left: 10px;">Analyser</button>
      </div>

      <div id="loading" style="display: none; text-align: center; padding: 40px;">
        <div style="display: inline-block; width: 40px; height: 40px; border: 3px solid #e0e0e0; border-top-color: #1F4788; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p>Chargement...</p>
      </div>

      <div id="results" style="display: none;">
        <div style="background: #e7f3ff; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
          <p id="summary" style="margin: 0; font-weight: 600;"></p>
        </div>

        <div id="modeLibre" class="mode-section"></div>
        <div id="modeBande" class="mode-section"></div>
        <div id="mode3Bandes" class="mode-section"></div>
        <div id="modeCadre" class="mode-section"></div>
      </div>
    </div>
  </div>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .mode-section {
      margin-bottom: 30px;
    }

    .mode-title {
      font-size: 20px;
      font-weight: 700;
      color: #333;
      margin-bottom: 15px;
      padding-bottom: 10px;
      border-bottom: 2px solid #1F4788;
    }
  </style>

  <script src="js/auth-utils.js?v=197"></script>
  <script src="js/season-utils.js?v=1"></script>
  <script>
    const API_URL = '/api';

    if (!requireAuth()) {
      throw new Error('Not authenticated');
    }
    const token = sessionStorage.getItem('token');

    // Populate the season dropdown on page load
    (async function () {
      const select = document.getElementById('seasonSelect');
      const current = await SeasonUtils.getCurrentSeason();
      SeasonUtils.populateSeasonSelect(select, current, { yearsBack: 2, yearsForward: 0 });
    })();

    async function loadData() {
      const season = document.getElementById('seasonSelect').value;
      const loading = document.getElementById('loading');
      const results = document.getElementById('results');
      const errorMessage = document.getElementById('errorMessage');

      loading.style.display = 'block';
      results.style.display = 'none';
      errorMessage.style.display = 'none';

      try {
        const response = await fetch(`${API_URL}/statistics/clubs/podiums?season=${season}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!response.ok) {
          throw new Error(`Erreur ${response.status}`);
        }

        const data = await response.json();

        // Analyze data
        const allClubs = new Set();
        let totalPodiums = 0;

        Object.values(data).forEach(modeClubs => {
          modeClubs.forEach(club => {
            allClubs.add(club.club);
            totalPodiums += club.podiums;
          });
        });

        // Display summary
        document.getElementById('summary').textContent =
          `${allClubs.size} clubs • ${totalPodiums} podiums au total`;

        // Display each mode
        const modes = {
          'Libre': { id: 'modeLibre', color: '#1F4788' },
          'Bande': { id: 'modeBande', color: '#28a745' },
          '3 Bandes': { id: 'mode3Bandes', color: '#dc3545' },
          'Cadre': { id: 'modeCadre', color: '#6f42c1' }
        };

        Object.entries(modes).forEach(([modeName, config]) => {
          const container = document.getElementById(config.id);
          const modeData = data[modeName] || [];

          if (modeData.length === 0) {
            container.innerHTML = '';
            return;
          }

          let html = `<div class="mode-title" style="color: ${config.color}">${modeName}</div>`;

          modeData.forEach((club, index) => {
            const isTop = index === 0;
            html += `
              <div class="club-card ${isTop ? 'highlight' : ''}">
                <div class="club-name">
                  ${isTop ? '👑 ' : `${index + 1}. `}${club.club}
                </div>
                <div class="medal-counts">
                  <span class="medal-count">🥇 ${club.gold}</span>
                  <span class="medal-count">🥈 ${club.silver}</span>
                  <span class="medal-count">🥉 ${club.bronze}</span>
                  <span class="medal-count" style="font-weight: 700; margin-left: auto;">Total: ${club.podiums}</span>
                </div>
              </div>
            `;
          });

          container.innerHTML = html;
        });

        loading.style.display = 'none';
        results.style.display = 'block';

      } catch (error) {
        console.error('Error loading data:', error);
        loading.style.display = 'none';
        errorMessage.textContent = `Erreur : ${error.message}`;
        errorMessage.style.display = 'block';
      }
    }

    // Auto-load on page load
    window.addEventListener('DOMContentLoaded', () => {
      loadData();
    });
  </script>
</body>
</html>
