<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directeur de Jeu — Phase finale</title>
  <link rel="icon" type="image/png" href="images/FrenchBillard-Icon-small.png">
  <link rel="stylesheet" href="css/styles.css?v=357">
  <script src="js/branding.js?v=197"></script>
  <style>
    .ddj-welcome-bar {
      background: linear-gradient(135deg, var(--color-primary, #1F4788) 0%, var(--color-secondary, #667eea) 100%);
      color: white;
      padding: 14px 18px;
      border-radius: 8px;
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ddj-welcome-bar .tournament-title { font-size: 1.1em; font-weight: 700; }
    .ddj-welcome-bar .tournament-meta { font-size: 0.9em; opacity: 0.92; }

    .ddj-steps { display: flex; gap: 8px; justify-content: center; margin: 0 0 18px 0; }
    .ddj-steps .dot { width: 14px; height: 14px; border-radius: 50%; background: #dee2e6; }
    .ddj-steps .dot.done { background: #28a745; }
    .ddj-steps .dot.active {
      background: var(--color-primary, #1F4788);
      box-shadow: 0 0 0 4px rgba(31,71,136,0.18);
    }

    /* Qualifier seeding list */
    .qualifiers-card {
      background: white;
      border: 2px solid var(--color-primary, #1F4788);
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .qualifiers-card h3 {
      margin: 0 0 10px 0;
      color: var(--color-primary, #1F4788);
      font-size: 1em;
      font-weight: 700;
    }
    .qualifiers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 10px;
    }
    .qualifier {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      background: #f8f9fa;
      border-radius: 8px;
    }
    .qualifier .seed {
      width: 28px; height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      flex-shrink: 0;
    }
    .qualifier .seed-1 { background: #d4a017; color: white; }
    .qualifier .seed-2 { background: #9fa8b0; color: white; }
    .qualifier .seed-3 { background: #cd7f32; color: white; }
    .qualifier .seed-4 { background: var(--color-primary, #1F4788); color: white; }
    .qualifier .name { font-weight: 600; font-size: 0.92em; }
    .qualifier .sub { font-size: 0.76em; color: #666; }

    /* Bracket phases */
    .phase-card {
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      background: white;
      margin-bottom: 14px;
    }
    .phase-card.pending { opacity: 0.55; background: #f8f9fa; }
    .phase-card.played { border-color: #28a745; background: #f8fff9; }
    .phase-card.stale { border-color: #dc3545; background: #fff5f5; }

    .phase-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: linear-gradient(90deg, #f0f4fa, #f8f9fa);
      border-radius: 8px 8px 0 0;
      border-bottom: 1px solid #e0e0e0;
    }
    .phase-card.played .phase-card-header { background: linear-gradient(90deg, #d4edda, #e7f7eb); }

    .phase-title {
      font-size: 1.1em;
      font-weight: 800;
      color: var(--color-primary, #1F4788);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .phase-title .emoji { font-size: 1.3em; }
    .phase-status {
      font-size: 0.85em;
      color: #666;
      font-weight: 600;
    }
    .phase-status.played { color: #28a745; }

    .phase-card-body { padding: 14px; }

    .match-params-strip {
      background: #e9f0f8;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.82em;
      color: #1F4788;
      font-weight: 600;
      margin-bottom: 12px;
      text-align: center;
    }

    .match-players {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
    }
    .match-player { text-align: center; }
    .match-player .name { font-weight: 700; font-size: 1.05em; color: #222; }
    .match-player .club { font-size: 0.8em; color: #666; margin-top: 2px; }
    .match-player .seed-tag {
      display: inline-block;
      font-size: 0.72em;
      background: #e9ecef;
      color: #666;
      padding: 2px 6px;
      border-radius: 10px;
      margin-top: 3px;
      font-weight: 600;
    }
    .match-vs { font-size: 1.2em; color: #888; font-weight: bold; }

    .match-pending-msg {
      text-align: center;
      padding: 20px;
      color: #888;
      font-style: italic;
      font-size: 0.92em;
    }

    /* Reuse score-input styles from the matchs page */
    .score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .score-col {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 10px;
    }
    .score-col.winner { background: #d4edda; box-shadow: inset 0 0 0 2px #28a745; }
    .score-col.loser { background: #f8d7da; opacity: 0.85; }
    .score-col.draw { background: #fff3cd; box-shadow: inset 0 0 0 2px #ffc107; }
    .score-col-header {
      font-size: 0.85em; font-weight: 600; color: #666;
      margin-bottom: 8px; text-align: center;
    }
    .score-row {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .score-label { font-size: 0.82em; color: #555; flex: 1; }
    .score-input {
      width: 70px; padding: 8px 10px;
      border: 1.5px solid #ccc; border-radius: 6px;
      font-size: 1em; font-weight: 700;
      text-align: center;
      -moz-appearance: textfield;
    }
    .score-input::-webkit-outer-spin-button,
    .score-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .score-input:focus {
      outline: none; border-color: var(--color-primary, #1F4788);
      box-shadow: 0 0 0 3px rgba(31,71,136,0.15);
    }
    .score-input.clamped { animation: clamp-flash 0.35s ease; }
    @keyframes clamp-flash {
      0% { background: white; }
      40% { background: #ffd4d4; border-color: #dc3545; }
      100% { background: white; }
    }
    .score-input.autofilled { animation: autofill-flash 0.45s ease; }
    @keyframes autofill-flash {
      0% { background: white; }
      30% { background: #d4e9ff; border-color: #1F4788; }
      100% { background: white; }
    }
    .match-moyenne {
      font-size: 0.82em; color: #555; font-weight: 600;
      text-align: center; margin-top: 6px;
      padding: 4px 8px; background: white; border-radius: 4px;
    }
    .match-moyenne .val { color: var(--color-primary, #1F4788); font-weight: 700; }

    .match-actions {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 14px; gap: 10px; flex-wrap: wrap;
    }
    .btn-save {
      padding: 10px 20px; border: none; border-radius: 6px;
      background: linear-gradient(135deg, var(--color-primary, #1F4788), var(--color-secondary, #667eea));
      color: white; font-weight: 700; cursor: pointer; font-size: 0.95em;
    }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 4px 8px rgba(31,71,136,0.3); }
    .btn-save:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Final places card */
    .podium-card {
      background: linear-gradient(135deg, #fef3c7, #fde68a);
      border: 2px solid #d4a017;
      border-radius: 10px;
      padding: 18px;
      margin-top: 16px;
    }
    .podium-card h3 {
      margin: 0 0 14px 0;
      font-size: 1.1em;
      color: #7a5a00;
      text-align: center;
    }
    .podium-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      background: white;
      border-radius: 8px;
      margin-bottom: 6px;
    }
    .podium-row .medal {
      width: 36px; height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2em;
      font-weight: 800;
      flex-shrink: 0;
    }
    .podium-row.p1 .medal { background: #d4a017; color: white; }
    .podium-row.p2 .medal { background: #9fa8b0; color: white; }
    .podium-row.p3 .medal { background: #cd7f32; color: white; }
    .podium-row.p4 .medal { background: #6c757d; color: white; }

    .ddj-action-bar {
      display: flex; gap: 10px; justify-content: space-between;
      flex-wrap: wrap; padding-top: 16px; margin-top: 16px;
      border-top: 1px solid #e0e0e0;
    }
    .ddj-btn {
      padding: 12px 20px; border-radius: 8px; border: none;
      font-size: 1em; font-weight: 700; cursor: pointer;
      transition: all 0.15s;
    }
    .ddj-btn-secondary { background: #6c757d; color: white; }
    .ddj-btn-secondary:hover { background: #5a6268; }
    .ddj-btn-primary {
      background: linear-gradient(135deg, #28a745, #218838);
      color: white; flex: 1; min-width: 240px;
    }
    .ddj-btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    .ddj-loading, .ddj-empty {
      text-align: center; padding: 60px 20px; color: #888;
    }

    .ddj-save-status {
      position: fixed; top: 20px; right: 20px;
      padding: 8px 14px; border-radius: 20px;
      background: rgba(40,167,69,0.95);
      color: white; font-size: 0.85em; font-weight: 600;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      z-index: 1000;
      opacity: 0; transform: translateY(-10px);
      transition: all 0.25s; pointer-events: none;
    }
    .ddj-save-status.visible { opacity: 1; transform: translateY(0); }
    .ddj-save-status.error { background: rgba(220,53,69,0.95); }
    .ddj-save-status.warning { background: rgba(255,193,7,0.98); color: #222; }

    .stale-warning {
      background: #fff3cd;
      border-left: 3px solid #ffc107;
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 10px;
      font-size: 0.85em;
      color: #856404;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="navbar">
      <div>
        <h2 style="margin-bottom: 0;"><img id="app-header-icon" src="images/FrenchBillard-Icon-small.png" alt="" style="height: 48px; width: 48px; vertical-align: middle; margin-right: 8px;"><span id="app-org-name" data-page-title="Phase finale (DdJ)">CDB</span></h2>
      </div>
      <div class="nav-links">
        <a href="#" id="matchsBackBtn">← Matchs</a>
        <a href="#" id="logoutBtn" class="nav-logout">Déconnexion</a>
      </div>
    </div>

    <div id="errorMessage" class="error" style="display: none;"></div>
    <div id="saveStatus" class="ddj-save-status">Enregistré ✓</div>

    <div class="ddj-welcome-bar">
      <div>
        <div class="tournament-title" id="tournamentTitle">Chargement…</div>
        <div class="tournament-meta" id="tournamentMeta"></div>
      </div>
      <div class="tournament-meta" id="tournamentParams"></div>
    </div>

    <div class="ddj-steps" title="Étape 4 sur 7 : Phase finale">
      <div class="dot done"></div>
      <div class="dot done"></div>
      <div class="dot done"></div>
      <div class="dot done"></div>
      <div class="dot active"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div id="mainContent">
      <div class="ddj-loading">Chargement du bracket…</div>
    </div>
  </div>

  <script src="js/auth-utils.js?v=197"></script>
  <script src="js/app-branding.js?v=216"></script>
  <script>
    const API_URL = '/api';

    if (!requireAuth()) { throw new Error('Not authenticated'); }
    const userRole = sessionStorage.getItem('userRole');
    if (userRole !== 'directeur_jeu' && userRole !== 'admin') {
      window.location.href = 'dashboard.html';
      throw new Error('Access denied');
    }
    const token = sessionStorage.getItem('token');

    const urlParams = new URLSearchParams(window.location.search);
    const compId = parseInt(urlParams.get('compId'), 10);
    if (!Number.isFinite(compId)) {
      document.getElementById('errorMessage').textContent = 'Aucune compétition sélectionnée.';
      document.getElementById('errorMessage').style.display = 'block';
      setTimeout(() => window.location.href = 'directeur-de-jeu.html', 2000);
      throw new Error('No compId in URL');
    }

    document.getElementById('matchsBackBtn').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = 'directeur-de-jeu-matchs.html?compId=' + compId;
    });
    const navBtn = document.getElementById('logoutBtn');
    if (userRole === 'directeur_jeu') {
      navBtn.addEventListener('click', (e) => {
        e.preventDefault();
        const orgSlug = sessionStorage.getItem('orgSlug') || '';
        sessionStorage.clear();
        window.location.href = orgSlug ? 'login.html?org=' + orgSlug : 'login.html';
      });
    } else {
      navBtn.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'dashboard.html';
      });
    }

    let saveStatusTimer = null;
    function showSaveStatus(msg, variant = 'success') {
      const el = document.getElementById('saveStatus');
      el.textContent = msg;
      el.classList.remove('error', 'warning');
      if (variant === 'error') el.classList.add('error');
      else if (variant === 'warning') el.classList.add('warning');
      el.classList.add('visible');
      if (saveStatusTimer) clearTimeout(saveStatusTimer);
      saveStatusTimer = setTimeout(() => el.classList.remove('visible'), 2000);
    }

    function escapeHtml(s) {
      return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    }

    function formatMoyenne(n) {
      if (n == null || isNaN(n) || n === 0) return '—';
      return Number(n).toFixed(3).replace('.', ',');
    }

    let state = {
      bracket: null,
      gameParams: { distance: null, reprises: null }
    };

    async function loadBracket() {
      try {
        const resp = await authFetch(`${API_URL}/directeur-jeu/competitions/${compId}/bracket`);
        if (!resp.ok) {
          const body = await resp.json().catch(() => ({}));
          throw new Error(body.error || `Erreur serveur (${resp.status})`);
        }
        const data = await resp.json();
        state.bracket = data;
        state.gameParams = data.game_params || state.gameParams;
        render();
      } catch (err) {
        console.error('[Bracket] load error:', err);
        document.getElementById('mainContent').innerHTML = `
          <div class="ddj-empty">
            <p>${escapeHtml(err.message)}</p>
            <p style="margin-top: 12px;">
              <a href="directeur-de-jeu-matchs.html?compId=${compId}">← Retour aux matchs</a>
            </p>
          </div>`;
      }
    }

    function render() {
      const b = state.bracket;
      const t = b.tournament;

      document.getElementById('tournamentTitle').textContent =
        `${t.mode || ''} ${t.categorie || ''}${t.nom ? ' — ' + t.nom : ''}`.trim();
      document.getElementById('tournamentMeta').textContent =
        `${formatDate(t.debut)}${t.lieu ? ' · ' + t.lieu : ''}`;
      document.getElementById('tournamentParams').textContent = 'Étape 4 : Phase finale';

      if (!b.can_start) {
        document.getElementById('mainContent').innerHTML = `
          <div class="ddj-empty">
            <p><strong>⚠️ La phase finale n'est pas encore accessible.</strong></p>
            <p style="margin-top: 12px;">
              Il faut d'abord terminer tous les matchs de poule (et avoir au moins ${b.bracket_size} joueurs qualifiés).
            </p>
            <p style="margin-top: 12px;">
              <a href="directeur-de-jeu-matchs.html?compId=${compId}">← Retour aux matchs de poule</a>
            </p>
          </div>`;
        return;
      }

      const qualifiersHtml = renderQualifiers(b.qualifiers);
      const phasesHtml = b.phases.map(renderPhase).join('');
      const podiumHtml = b.final_places ? renderPodium(b.final_places) : '';

      document.getElementById('mainContent').innerHTML = `
        ${qualifiersHtml}
        ${phasesHtml}
        ${podiumHtml}
        <div class="ddj-action-bar">
          <button class="ddj-btn ddj-btn-secondary" onclick="window.location.href='directeur-de-jeu-matchs.html?compId=${compId}'">
            ← Retour aux matchs
          </button>
          <button class="ddj-btn ddj-btn-primary" disabled title="Étape 5 (matchs de classement) — arrive prochainement">
            Matchs de classement → (bientôt)
          </button>
        </div>
      `;

      // Wire inputs
      document.querySelectorAll('.phase-card[data-phase]').forEach(card => {
        const inputs = card.querySelectorAll('.score-input');
        inputs.forEach(i => {
          i.addEventListener('input', () => {
            clampInput(i);
            autoCopyReprises(card, i);
            updateMatchVisualState(card);
            updateLiveMoyennes(card);
          });
        });
      });
      document.querySelectorAll('.btn-save[data-phase]').forEach(btn => {
        btn.addEventListener('click', () => savePhase(btn.dataset.phase));
      });
    }

    function renderQualifiers(quals) {
      const rowsHtml = quals.map((q, i) => `
        <div class="qualifier">
          <div class="seed seed-${i + 1}">${i + 1}</div>
          <div style="flex: 1; min-width: 0;">
            <div class="name">${escapeHtml(q.player_name)}</div>
            <div class="sub">${escapeHtml(q.club || '')} · Poule ${q.poule_number}</div>
          </div>
          <div style="font-size: 0.82em; color: #666; white-space: nowrap;">
            ${q.match_points} PM · ${formatMoyenne(q.moyenne)}
          </div>
        </div>
      `).join('');
      return `
        <div class="qualifiers-card">
          <h3>🏆 Qualifiés pour la phase finale (${quals.length} joueurs)</h3>
          <div class="qualifiers-grid">${rowsHtml}</div>
        </div>
      `;
    }

    const PHASE_META = {
      SF1: { emoji: '⚔️', label: 'Demi-finale 1' },
      SF2: { emoji: '⚔️', label: 'Demi-finale 2' },
      F:   { emoji: '🏆', label: 'Finale' },
      PF:  { emoji: '🥉', label: 'Petite finale' }
    };

    function renderPhase(phase) {
      const meta = PHASE_META[phase.phase] || { emoji: '•', label: phase.phase };

      if (!phase.can_enter) {
        return `
          <div class="phase-card pending">
            <div class="phase-card-header">
              <div class="phase-title"><span class="emoji">${meta.emoji}</span>${meta.label}</div>
              <div class="phase-status">En attente des demi-finales</div>
            </div>
            <div class="phase-card-body">
              <div class="match-pending-msg">
                Les joueurs seront automatiquement assignés après la fin des demi-finales.
              </div>
            </div>
          </div>
        `;
      }

      const playedClass = phase.is_played ? 'played' : '';
      const staleClass = phase.stale ? 'stale' : '';
      const statusLabel = phase.is_played
        ? (phase.outcome === 'draw' ? '⚖️ Match nul (à revoir)' : '✓ Terminé')
        : 'À jouer';
      const statusCls = phase.is_played ? 'played' : '';

      let col1Class = 'score-col';
      let col2Class = 'score-col';
      if (phase.is_played) {
        if (phase.outcome === 'p1_win') { col1Class += ' winner'; col2Class += ' loser'; }
        else if (phase.outcome === 'p2_win') { col1Class += ' loser'; col2Class += ' winner'; }
        else { col1Class += ' draw'; col2Class += ' draw'; }
      }

      const dist = state.gameParams.distance;
      const rep = state.gameParams.reprises;
      const paramStrip = (dist || rep)
        ? `<div class="match-params-strip">🎯 Distance : ${dist ?? '?'} pts · Reprises max : ${rep ?? '?'}</div>`
        : '';

      const m1 = (phase.p1_points != null && phase.p1_reprises > 0) ? (phase.p1_points / phase.p1_reprises) : null;
      const m2 = (phase.p2_points != null && phase.p2_reprises > 0) ? (phase.p2_points / phase.p2_reprises) : null;

      const maxPts = dist != null ? ` max="${dist}"` : '';
      const maxRep = rep != null ? ` max="${rep}"` : '';

      const staleBanner = phase.stale
        ? `<div class="stale-warning">⚠️ Les joueurs ont changé suite à la modification d'un match de poule. Les scores ci-dessous peuvent ne plus correspondre — veuillez les ressaisir.</div>`
        : '';

      return `
        <div class="phase-card ${playedClass} ${staleClass}" data-phase="${phase.phase}">
          <div class="phase-card-header">
            <div class="phase-title"><span class="emoji">${meta.emoji}</span>${meta.label}</div>
            <div class="phase-status ${statusCls}">${statusLabel}</div>
          </div>
          <div class="phase-card-body">
            ${staleBanner}
            ${paramStrip}
            <div class="match-players">
              <div class="match-player">
                <div class="name">${escapeHtml(phase.p1.player_name)}</div>
                <div class="club">${escapeHtml(phase.p1.club || '')}</div>
                <span class="seed-tag">Poule ${phase.p1.poule_number}</span>
              </div>
              <div class="match-vs">VS</div>
              <div class="match-player">
                <div class="name">${escapeHtml(phase.p2.player_name)}</div>
                <div class="club">${escapeHtml(phase.p2.club || '')}</div>
                <span class="seed-tag">Poule ${phase.p2.poule_number}</span>
              </div>
            </div>
            <div class="score-grid">
              <div class="${col1Class}" data-side="p1">
                <div class="score-col-header">${escapeHtml(phase.p1.player_name)}</div>
                <div class="score-row"><span class="score-label">Points :</span>
                  <input type="number" class="score-input" data-field="p1_points" inputmode="numeric" min="0"${maxPts}
                    value="${phase.p1_points != null ? phase.p1_points : ''}"></div>
                <div class="score-row"><span class="score-label">Reprises :</span>
                  <input type="number" class="score-input" data-field="p1_reprises" inputmode="numeric" min="0"${maxRep}
                    value="${phase.p1_reprises != null ? phase.p1_reprises : ''}"></div>
                <div class="score-row"><span class="score-label">Meill. série :</span>
                  <input type="number" class="score-input" data-field="p1_serie" inputmode="numeric" min="0"${maxPts}
                    value="${phase.p1_serie != null ? phase.p1_serie : ''}"></div>
                <div class="match-moyenne" data-role="moyenne-p1">Moyenne : <span class="val">${formatMoyenne(m1)}</span></div>
              </div>
              <div class="${col2Class}" data-side="p2">
                <div class="score-col-header">${escapeHtml(phase.p2.player_name)}</div>
                <div class="score-row"><span class="score-label">Points :</span>
                  <input type="number" class="score-input" data-field="p2_points" inputmode="numeric" min="0"${maxPts}
                    value="${phase.p2_points != null ? phase.p2_points : ''}"></div>
                <div class="score-row"><span class="score-label">Reprises :</span>
                  <input type="number" class="score-input" data-field="p2_reprises" inputmode="numeric" min="0"${maxRep}
                    value="${phase.p2_reprises != null ? phase.p2_reprises : ''}"></div>
                <div class="score-row"><span class="score-label">Meill. série :</span>
                  <input type="number" class="score-input" data-field="p2_serie" inputmode="numeric" min="0"${maxPts}
                    value="${phase.p2_serie != null ? phase.p2_serie : ''}"></div>
                <div class="match-moyenne" data-role="moyenne-p2">Moyenne : <span class="val">${formatMoyenne(m2)}</span></div>
              </div>
            </div>
            <div class="match-actions">
              <span class="phase-status ${statusCls}">${phase.is_played
                ? `PM : ${phase.p1_match_points} - ${phase.p2_match_points}`
                : 'Saisissez les scores puis Enregistrer'}</span>
              <button class="btn-save" data-phase="${phase.phase}">💾 Enregistrer</button>
            </div>
          </div>
        </div>
      `;
    }

    function renderPodium(places) {
      const rowsHtml = places.map(p => `
        <div class="podium-row p${p.place}">
          <div class="medal">${p.place}</div>
          <div style="flex: 1;">
            <div style="font-weight: 700;">${escapeHtml(p.name || p.licence)}</div>
          </div>
        </div>
      `).join('');
      return `
        <div class="podium-card">
          <h3>🏆 Classement final — Bracket</h3>
          ${rowsHtml}
          <p style="text-align: center; font-size: 0.82em; color: #7a5a00; margin: 10px 0 0 0;">
            Les places 5 à 9 seront déterminées par les matchs de classement (étape 5, à venir).
          </p>
        </div>
      `;
    }

    function clampInput(input) {
      const raw = input.value;
      if (raw === '') return;
      const n = Number(raw);
      if (!Number.isFinite(n)) return;
      const max = input.max !== '' ? Number(input.max) : null;
      const min = input.min !== '' ? Number(input.min) : 0;
      let clamped = n;
      if (max != null && clamped > max) clamped = max;
      if (clamped < min) clamped = min;
      if (clamped !== n) {
        input.value = String(clamped);
        input.classList.remove('clamped');
        void input.offsetWidth;
        input.classList.add('clamped');
        const f = input.dataset.field || '';
        if (f.endsWith('_points')) showSaveStatus(`⚠️ Distance maximum : ${max} pts`, 'warning');
        else if (f.endsWith('_reprises')) showSaveStatus(`⚠️ Reprises maximum : ${max}`, 'warning');
        else if (f.endsWith('_serie')) showSaveStatus(`⚠️ Meilleure série : ${max} max`, 'warning');
      }
    }

    function autoCopyReprises(card, sourceInput) {
      const f = sourceInput.dataset.field;
      if (f !== 'p1_reprises' && f !== 'p2_reprises') return;
      const otherField = f === 'p1_reprises' ? 'p2_reprises' : 'p1_reprises';
      const target = card.querySelector(`[data-field="${otherField}"]`);
      if (!target) return;
      if (target.value === sourceInput.value) return;
      target.value = sourceInput.value;
      if (sourceInput.value !== '') {
        target.classList.remove('autofilled');
        void target.offsetWidth;
        target.classList.add('autofilled');
      }
    }

    function updateMatchVisualState(card) {
      const p1p = parseFloat(card.querySelector('[data-field="p1_points"]').value);
      const p2p = parseFloat(card.querySelector('[data-field="p2_points"]').value);
      const c1 = card.querySelector('[data-side="p1"]');
      const c2 = card.querySelector('[data-side="p2"]');
      c1.classList.remove('winner', 'loser', 'draw');
      c2.classList.remove('winner', 'loser', 'draw');
      if (isNaN(p1p) || isNaN(p2p)) return;
      if (p1p > p2p) { c1.classList.add('winner'); c2.classList.add('loser'); }
      else if (p1p < p2p) { c1.classList.add('loser'); c2.classList.add('winner'); }
      else { c1.classList.add('draw'); c2.classList.add('draw'); }
    }

    function updateLiveMoyennes(card) {
      ['p1', 'p2'].forEach(side => {
        const ptsEl = card.querySelector(`[data-field="${side}_points"]`);
        const repEl = card.querySelector(`[data-field="${side}_reprises"]`);
        const moyEl = card.querySelector(`[data-role="moyenne-${side}"] .val`);
        if (!ptsEl || !repEl || !moyEl) return;
        const pts = ptsEl.value === '' ? null : Number(ptsEl.value);
        const rep = repEl.value === '' ? null : Number(repEl.value);
        if (pts == null || rep == null || rep === 0 || !Number.isFinite(pts) || !Number.isFinite(rep)) {
          moyEl.textContent = '—';
          return;
        }
        moyEl.textContent = formatMoyenne(pts / rep);
      });
    }

    async function savePhase(phase) {
      const card = document.querySelector(`.phase-card[data-phase="${phase}"]`);
      if (!card) return;
      const payload = { phase };
      ['p1_points', 'p1_reprises', 'p1_serie', 'p2_points', 'p2_reprises', 'p2_serie'].forEach(f => {
        const input = card.querySelector(`[data-field="${f}"]`);
        payload[f] = input.value === '' ? null : parseInt(input.value, 10);
      });
      if ((payload.p1_points != null) !== (payload.p2_points != null)) {
        showSaveStatus('Renseignez les points des deux joueurs', 'error');
        return;
      }
      // Knockout sanity: no draws allowed
      if (payload.p1_points != null && payload.p1_points === payload.p2_points) {
        showSaveStatus('Pas de match nul en phase finale', 'error');
        return;
      }
      try {
        const resp = await authFetch(`${API_URL}/directeur-jeu/competitions/${compId}/bracket`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!resp.ok) {
          const body = await resp.json().catch(() => ({}));
          throw new Error(body.error || `Erreur ${resp.status}`);
        }
        const data = await resp.json();
        state.bracket = data.bracket;
        state.gameParams = data.bracket.game_params || state.gameParams;
        showSaveStatus('Match enregistré ✓');
        render();
      } catch (err) {
        console.error('[Bracket] save error:', err);
        showSaveStatus('Erreur — ' + err.message, 'error');
      }
    }

    loadBracket();
  </script>
</body>
</html>
