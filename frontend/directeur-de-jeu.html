<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Directeur de Jeu - Gestion Tournois</title>
  <link rel="icon" type="image/png" href="images/FrenchBillard-Icon-small.png">
  <link rel="stylesheet" href="css/styles.css?v=357">
  <script src="js/branding.js?v=197"></script>
  <style>
    .ddj-welcome-bar {
      background: linear-gradient(135deg, var(--color-primary, #1F4788) 0%, var(--color-secondary, #667eea) 100%);
      color: white;
      padding: 15px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }
    .ddj-welcome-bar .welcome-name {
      font-size: 1.1em;
      font-weight: 600;
    }
    .ddj-welcome-bar .welcome-date {
      font-size: 0.95em;
      opacity: 0.9;
    }

    .ddj-section-title {
      font-size: 1.15em;
      font-weight: 700;
      color: var(--color-primary, #1F4788);
      margin: 20px 0 12px 0;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--color-primary, #1F4788);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .ddj-cards-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }
    @media (min-width: 640px) {
      .ddj-cards-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
    @media (min-width: 960px) {
      .ddj-cards-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .ddj-comp-card {
      background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
      border: 2px solid #dee2e6;
      border-radius: 12px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-left: 5px solid #6c757d;
      position: relative;
    }
    .ddj-comp-card:hover {
      border-color: var(--color-primary, #1F4788);
      box-shadow: 0 4px 12px rgba(31, 71, 136, 0.15);
      transform: translateY(-2px);
    }
    .ddj-comp-card.status-a-preparer {
      border-left-color: #ff9800;
    }
    .ddj-comp-card.status-en-attente {
      border-left-color: #6c757d;
    }

    .ddj-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .ddj-card-mode {
      font-size: 0.85em;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .ddj-card-title {
      font-size: 1.1em;
      font-weight: bold;
      color: var(--color-primary, #1F4788);
      margin-bottom: 10px;
    }

    .ddj-card-details {
      font-size: 0.9em;
      color: #555;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 10px;
    }
    .ddj-card-details span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .ddj-card-stats {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      padding-top: 10px;
      border-top: 1px solid #eee;
      font-size: 0.9em;
    }
    .ddj-stat-convoques {
      font-weight: 600;
      color: #17a2b8;
    }
    .ddj-stat-forfaits {
      font-weight: 600;
      color: #dc3545;
    }
    .ddj-stat-params {
      color: #666;
      font-style: italic;
    }

    .ddj-status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.75em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }
    .ddj-status-badge.a-preparer {
      background: #fff3e0;
      color: #e65100;
    }
    .ddj-status-badge.en-attente {
      background: #f0f0f0;
      color: #666;
    }

    .ddj-section-past {
      opacity: 0.6;
    }

    .ddj-empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #999;
    }
    .ddj-empty-state .empty-logo {
      height: 160px;
      width: 160px;
      opacity: 0.12;
      margin-bottom: 24px;
      filter: grayscale(30%);
    }
    .ddj-empty-state p {
      font-size: 1.1em;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="navbar">
      <div>
        <h2 style="margin-bottom: 0;"><img id="app-header-icon" src="images/FrenchBillard-Icon-small.png" alt="" style="height: 48px; width: 48px; vertical-align: middle; margin-right: 8px;"><span id="app-org-name" data-page-title="Directeur de Jeu">CDB</span></h2>
      </div>
      <div class="nav-links">
        <a href="dashboard.html" id="ddj-home-btn" class="nav-link" style="margin-right:8px;">🏠 Tableau de bord</a>
        <a href="#" id="ddjNavBtn" style="cursor: pointer;">Déconnexion</a>
      </div>
    </div>

    <div id="errorMessage" class="error" style="display: none;"></div>

    <div class="ddj-welcome-bar">
      <span class="welcome-name">Bienvenue, <span id="ddj-username"></span></span>
      <span class="welcome-date" id="ddj-today-date"></span>
    </div>

    <div id="ddj-content">
      <!-- Today's competitions -->
      <div id="ddj-today-section" style="display: none;">
        <div class="ddj-section-title">
          <img src="images/FrenchBillard-Icon-small.png" alt="" style="height: 22px; width: 22px; vertical-align: middle;">
          Compétitions du jour
        </div>
        <div id="ddj-today-cards" class="ddj-cards-grid"></div>
      </div>

      <!-- Past competitions -->
      <div id="ddj-past-section" class="ddj-section-past" style="display: none;">
        <div class="ddj-section-title">
          Journées précédentes
        </div>
        <div id="ddj-past-cards" class="ddj-cards-grid"></div>
      </div>

      <!-- V 2.0.869 — Admin-only "load older tournaments" control for
           backfilling via the E2i import. Default DdJ view shows last 7
           days; admin can widen to any date in the past. -->
      <div class="admin-only" style="margin-top: 24px; padding: 16px; background: #f8f9fa; border: 1px dashed #adb5bd; border-radius: 8px; text-align: center;">
        <p style="margin: 0 0 10px 0; font-size: 0.92em; color: #495057;">
          🔑 <strong>Administrateur</strong> — Vous ne voyez pas le tournoi recherché ? Élargissez la fenêtre :
        </p>
        <label style="font-size: 0.88em; color: #666; margin-right: 8px;">À partir du :</label>
        <input type="date" id="ddj-since-date" style="padding: 6px 10px; border: 1px solid #ced4da; border-radius: 4px; font-size: 0.9em;">
        <button onclick="reloadCompetitionsWithSince()" style="margin-left: 8px; padding: 6px 14px; background: #1F4788; color: white; border: none; border-radius: 4px; font-size: 0.88em; font-weight: 600; cursor: pointer;">
          🔄 Charger
        </button>
        <span style="font-size: 0.82em; color: #888; margin-left: 10px;">(par défaut : 7 derniers jours)</span>
      </div>

      <!-- Empty state -->
      <div id="ddj-empty-state" class="ddj-empty-state" style="display: none;">
        <img id="ddj-empty-logo" class="empty-logo" src="images/FrenchBillard-Icon-small.png" alt="">
        <p>Aucune compétition programmée aujourd'hui</p>
      </div>
    </div>
  </div>

  <script src="js/auth-utils.js?v=197"></script>
  <script src="js/app-branding.js?v=216"></script>
  <script>
    const API_URL = '/api';

    // Auth guard
    if (!requireAuth()) {
      throw new Error('Not authenticated');
    }

    // Role guard: only directeur_jeu and admin
    const userRole = sessionStorage.getItem('userRole');
    if (userRole !== 'directeur_jeu' && userRole !== 'admin') {
      window.location.href = 'dashboard.html';
      throw new Error('Access denied');
    }

    const token = sessionStorage.getItem('token');
    const username = sessionStorage.getItem('username');

    // Display welcome
    document.getElementById('ddj-username').textContent = username || 'Directeur de Jeu';

    // Display today's date in French
    const todayFormatted = new Date().toLocaleDateString('fr-FR', {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
    // Capitalize first letter
    document.getElementById('ddj-today-date').textContent =
      todayFormatted.charAt(0).toUpperCase() + todayFormatted.slice(1);

    // Set org logo on empty state (use getOrganizationLogoUrl from app-branding.js)
    (async () => {
      try {
        const logoUrl = await getOrganizationLogoUrl();
        const emptyLogo = document.getElementById('ddj-empty-logo');
        if (emptyLogo && logoUrl) {
          emptyLogo.src = logoUrl;
          emptyLogo.onerror = function() { this.src = 'images/FrenchBillard-Icon-small.png'; };
        }
      } catch (e) { /* keep default icon */ }
    })();

    // Navigation button: depends on role
    // - DdJ user: real logout → CDB login screen
    // - Admin: back to CDB dashboard
    // - Super Admin: back to SA dashboard (FFB level)
    const navBtn = document.getElementById('ddjNavBtn');
    const isSAImpersonating = !!sessionStorage.getItem('sa_token');  // SA impersonating a CDB
    const isAdmin = userRole === 'admin';

    if (isSAImpersonating) {
      navBtn.textContent = '← Retour Plateforme';
      navBtn.style.background = 'linear-gradient(135deg, #6c757d, #495057)';
      navBtn.style.color = 'white';
      navBtn.style.borderRadius = '8px';
      navBtn.style.padding = '8px 16px';
      navBtn.addEventListener('click', (e) => {
        e.preventDefault();
        returnToSuperAdmin();
      });
    } else if (isAdmin) {
      navBtn.textContent = '← Retour';
      navBtn.style.background = 'linear-gradient(135deg, var(--color-primary, #1F4788), var(--color-secondary, #667eea))';
      navBtn.style.color = 'white';
      navBtn.style.borderRadius = '8px';
      navBtn.style.padding = '8px 16px';
      navBtn.addEventListener('click', (e) => {
        e.preventDefault();
        window.location.href = 'dashboard.html';
      });
    } else {
      // DdJ user: real logout
      navBtn.addEventListener('click', (e) => {
        e.preventDefault();
        const orgSlug = sessionStorage.getItem('orgSlug') || '';
        sessionStorage.clear();
        const loginUrl = orgSlug ? 'login.html?org=' + orgSlug : 'login.html';
        window.location.href = loginUrl;
      });
    }

    // Format date as DD/MM/YYYY
    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      const day = String(d.getDate()).padStart(2, '0');
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const year = d.getFullYear();
      return `${day}/${month}/${year}`;
    }

    // Build a competition card HTML
    function buildCompCard(comp) {
      const hasConvoques = (comp.convoque_count || 0) > 0;
      const statusClass = hasConvoques ? 'status-a-preparer' : 'status-en-attente';
      const badgeClass = hasConvoques ? 'a-preparer' : 'en-attente';
      const badgeLabel = hasConvoques ? 'À préparer' : 'En attente';

      const forfaitHtml = (comp.forfait_count || 0) > 0
        ? `<span class="ddj-stat-forfaits">&#9888;&#65039; ${comp.forfait_count} forfait(s)</span>`
        : '';

      const paramsHtml = (comp.distance || comp.reprises)
        ? `<span class="ddj-stat-params">${comp.distance || '?'} pts / ${comp.reprises || '?'} rep</span>`
        : '';

      // V 2.0.868 — Admin-only "Importer E2i" button for backfilling a
      // tournament played outside the app from an E2i CSV (Tier 1: poule
      // scores only). Hidden for DdJ-role / non-admin users.
      const compId = comp.tournoi_id || comp.id || '';
      const e2iBtn = `
        <button class="admin-only ddj-e2i-btn" data-comp-id="${compId}"
                onclick="event.stopPropagation(); openE2iImportModal('${compId}', '${(comp.nom || '').replace(/'/g, "\\'")}')"
                title="Pré-remplir les scores depuis un export CSV E2i (admin)"
                style="background:#6c757d;color:white;border:none;padding:6px 12px;
                       border-radius:6px;font-size:0.85em;font-weight:600;cursor:pointer;
                       margin-top:8px;">
          📥 Importer E2i
        </button>`;

      return `
        <div class="ddj-comp-card ${statusClass}" data-comp-id="${compId}">
          <div class="ddj-card-header">
            <span class="ddj-card-mode">${comp.mode || ''} ${comp.categorie || ''}</span>
            <span class="ddj-status-badge ${badgeClass}">${badgeLabel}</span>
          </div>
          <div class="ddj-card-title">${comp.nom || comp.tournament_name || ''}</div>
          <div class="ddj-card-details">
            <span>&#128197; ${formatDate(comp.debut || comp.date)}</span>
            <span>&#128205; ${comp.lieu || 'Lieu non défini'}</span>
          </div>
          <div class="ddj-card-stats">
            <span class="ddj-stat-convoques">&#128101; ${comp.convoque_count || 0} convoqué(s)</span>
            ${forfaitHtml}
            ${paramsHtml}
          </div>
          ${e2iBtn}
        </div>
      `;
    }

    // V 2.0.868 — E2i import modal
    function openE2iImportModal(compId, nom) {
      // Build modal on first open
      let modal = document.getElementById('e2iImportModal');
      if (!modal) {
        modal = document.createElement('div');
        modal.id = 'e2iImportModal';
        modal.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);display:flex;align-items:center;justify-content:center;z-index:9999;';
        modal.innerHTML = `
          <div style="background:white;border-radius:14px;padding:24px 28px;max-width:640px;width:calc(100% - 40px);max-height:90vh;overflow-y:auto;">
            <h3 id="e2iModalTitle" style="margin:0 0 12px 0;color:#1F4788;">📥 Importer un CSV E2i vers le DdJ</h3>
            <p id="e2iModalSubtitle" style="margin:0 0 14px;color:#666;font-size:0.92em;"></p>

            <div style="background:#fff3cd;border-left:3px solid #ffc107;padding:10px 14px;border-radius:6px;margin-bottom:14px;font-size:0.88em;color:#856404;">
              <strong>⚠️ Action administrateur</strong> — Cet outil pré-remplit les scores de poule du DdJ depuis un export E2i.
              <strong>Tier 1 actuel :</strong> seuls les matchs de poule sont importés. Le bracket et la consolante restent à saisir manuellement (Tier 2/3 à venir).
            </div>

            <label style="display:block;font-weight:600;margin-bottom:6px;">Fichier CSV E2i (matchs)</label>
            <input type="file" id="e2iFileInput" accept=".csv" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:6px;margin-bottom:14px;">

            <div id="e2iPreviewArea" style="display:none;background:#f8f9fa;border-radius:8px;padding:14px;margin-bottom:14px;font-size:0.9em;"></div>

            <div id="e2iErrorArea" style="display:none;background:#f8d7da;color:#721c24;padding:10px 14px;border-radius:6px;margin-bottom:14px;font-size:0.9em;"></div>

            <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap;">
              <button onclick="closeE2iModal()" style="padding:10px 18px;background:#6c757d;color:white;border:none;border-radius:6px;font-weight:600;cursor:pointer;">Annuler</button>
              <button id="e2iPreviewBtn" onclick="runE2iPreview()" style="padding:10px 18px;background:#1F4788;color:white;border:none;border-radius:6px;font-weight:600;cursor:pointer;">🔍 Aperçu</button>
              <button id="e2iApplyBtn" onclick="runE2iApply()" disabled style="padding:10px 18px;background:#28a745;color:white;border:none;border-radius:6px;font-weight:700;cursor:pointer;opacity:0.5;">✅ Importer</button>
            </div>
          </div>`;
        document.body.appendChild(modal);
        modal.addEventListener('click', (e) => { if (e.target === modal) closeE2iModal(); });
      }
      modal.dataset.compId = compId;
      document.getElementById('e2iModalTitle').textContent = '📥 Importer un CSV E2i vers le DdJ';
      document.getElementById('e2iModalSubtitle').textContent = `Tournoi : ${nom || 'compId ' + compId}`;
      document.getElementById('e2iPreviewArea').style.display = 'none';
      document.getElementById('e2iErrorArea').style.display = 'none';
      document.getElementById('e2iApplyBtn').disabled = true;
      document.getElementById('e2iApplyBtn').style.opacity = '0.5';
      document.getElementById('e2iFileInput').value = '';
      modal.style.display = 'flex';
    }

    function closeE2iModal() {
      const m = document.getElementById('e2iImportModal');
      if (m) m.style.display = 'none';
    }
    window.openE2iImportModal = openE2iImportModal;
    window.closeE2iModal = closeE2iModal;

    async function _e2iCall(mode) {
      const modal = document.getElementById('e2iImportModal');
      const compId = modal.dataset.compId;
      const fileInput = document.getElementById('e2iFileInput');
      const errArea = document.getElementById('e2iErrorArea');
      errArea.style.display = 'none';

      if (!fileInput.files || fileInput.files.length === 0) {
        errArea.textContent = 'Veuillez sélectionner un fichier CSV.';
        errArea.style.display = 'block';
        return null;
      }
      const fd = new FormData();
      fd.append('files', fileInput.files[0]);
      fd.append('mode', mode);
      const tk = sessionStorage.getItem('token');
      const resp = await fetch(`${API_URL}/directeur-jeu/competitions/${compId}/import-e2i-csv`, {
        method: 'POST', headers: { 'Authorization': `Bearer ${tk}` }, body: fd
      });
      const data = await resp.json();
      if (!resp.ok) {
        errArea.textContent = data.error || `Erreur ${resp.status}`;
        errArea.style.display = 'block';
        return null;
      }
      return data;
    }

    async function runE2iPreview() {
      const previewArea = document.getElementById('e2iPreviewArea');
      const applyBtn = document.getElementById('e2iApplyBtn');
      previewArea.innerHTML = '<em>Analyse en cours…</em>';
      previewArea.style.display = 'block';
      const data = await _e2iCall('preview');
      if (!data) { previewArea.style.display = 'none'; return; }
      const s = data.summary;
      const ts = data.tier_status;
      const poulesList = s.poules.map(p => `Poule ${p.poule_label}: ${p.player_count} joueurs / ${p.match_count} matchs`).join('<br>');
      const warnHtml = (data.warnings && data.warnings.length > 0)
        ? `<div style="margin-top:8px;color:#856404;font-size:0.88em;">⚠️ ${data.warnings.length} avertissement(s) :<br>${data.warnings.slice(0,3).map(w => '• ' + w).join('<br>')}${data.warnings.length > 3 ? '<br>…' : ''}</div>` : '';
      previewArea.innerHTML = `
        <strong>📊 Aperçu</strong><br>
        <strong>${s.total_csv_matches}</strong> matchs dans le CSV — <strong>${s.players}</strong> joueurs uniques<br>
        <strong style="color:#28a745;">${s.poule_matches}</strong> matchs de poule à importer (${s.poules.length} poule(s))<br>
        <span style="color:#666;">→ ${ts.bracket === 'no_matches' ? 'aucun match de bracket' : s.bracket_matches + ' matchs bracket (Tier 2, pas encore importé)'}</span><br>
        <span style="color:#666;">→ ${ts.consolante === 'no_matches' ? 'aucun match de consolante' : s.consolante_matches + ' matchs consolante (Tier 3, pas encore importé)'}</span><br>
        <span style="color:#666;">→ ${ts.barrage === 'no_matches' ? 'aucun match de barrage' : s.barrage_matches + ' matchs barrage (Tier 4, pas encore importé)'}</span>
        <hr style="margin:10px 0;border:none;border-top:1px solid #ddd;">
        ${poulesList}
        ${warnHtml}
      `;
      applyBtn.disabled = false;
      applyBtn.style.opacity = '1';
    }
    window.runE2iPreview = runE2iPreview;

    async function runE2iApply() {
      if (!confirm('Importer les scores de poule ?\n\nLes données existantes (convocation_poules + ddj_poule_matches) pour ce tournoi seront REMPLACÉES.')) return;
      const data = await _e2iCall('apply');
      if (!data) return;
      alert(`✅ Import réussi !\n${data.applied_counts.players} joueurs et ${data.applied_counts.poule_matches} matchs importés.\n\nRedirection vers la page Matchs poules…`);
      closeE2iModal();
      window.location.href = data.redirect_url || `directeur-de-jeu-matchs.html?compId=${document.getElementById('e2iImportModal').dataset.compId}`;
    }
    window.runE2iApply = runE2iApply;

    // V 2.0.869 — Admin reload with a wider lookback window for E2i backfill
    function reloadCompetitionsWithSince() {
      const input = document.getElementById('ddj-since-date');
      const since = (input && input.value) || '';
      if (!since || !/^\d{4}-\d{2}-\d{2}$/.test(since)) {
        alert('Veuillez choisir une date de début valide.');
        return;
      }
      loadCompetitions(since);
    }
    window.reloadCompetitionsWithSince = reloadCompetitionsWithSince;

    // Load competitions
    async function loadCompetitions(sinceOverride) {
      try {
        const fetchFn = typeof authFetch === 'function' ? authFetch : (url, opts) => {
          opts = opts || {};
          opts.headers = Object.assign({}, opts.headers, { 'Authorization': 'Bearer ' + token });
          return fetch(url, opts);
        };

        // V 2.0.869 — admin can pass ?since=YYYY-MM-DD to widen the window
        const qs = sinceOverride ? `?since=${encodeURIComponent(sinceOverride)}` : '';
        const response = await fetchFn(`${API_URL}/directeur-jeu/competitions${qs}`);

        if (!response.ok) {
          throw new Error(`Erreur serveur (${response.status})`);
        }

        const data = await response.json();
        const competitions = Array.isArray(data) ? data : (data.competitions || []);

        const todayComps = competitions.filter(c => c.is_today === true);
        const pastComps = competitions.filter(c => c.is_today === false);

        const todaySection = document.getElementById('ddj-today-section');
        const pastSection = document.getElementById('ddj-past-section');
        const emptyState = document.getElementById('ddj-empty-state');

        if (todayComps.length > 0) {
          document.getElementById('ddj-today-cards').innerHTML = todayComps.map(buildCompCard).join('');
          todaySection.style.display = 'block';
        }

        if (pastComps.length > 0) {
          document.getElementById('ddj-past-cards').innerHTML = pastComps.map(buildCompCard).join('');
          pastSection.style.display = 'block';
        }

        if (todayComps.length === 0 && pastComps.length === 0) {
          emptyState.style.display = 'block';
        }

        // Wire card click → pointage screen (Step 1 of the DdJ workflow).
        // Both today's and past competitions are clickable: a DdJ commonly
        // resumes a session the day after (e.g. saturday tournament, results
        // entered sunday morning). Individual step endpoints don't restrict
        // by date, so deep-linking works regardless of card origin.
        document.querySelectorAll('#ddj-today-cards .ddj-comp-card, #ddj-past-cards .ddj-comp-card').forEach(card => {
          card.addEventListener('click', () => {
            const id = card.getAttribute('data-comp-id');
            if (!id) return;
            window.location.href = 'directeur-de-jeu-pointage.html?compId=' + encodeURIComponent(id);
          });
        });

      } catch (error) {
        console.error('Erreur chargement compétitions:', error);
        const errEl = document.getElementById('errorMessage');
        errEl.textContent = 'Impossible de charger les compétitions. ' + error.message;
        errEl.style.display = 'block';
      }
    }

    // Init
    loadCompetitions();
    if (typeof applyRoleBasedNav === 'function') applyRoleBasedNav();
  </script>
</body>
</html>
