<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tournoi en direct</title>
<style>
  /* =====================================================================
     V 2.0.704 — DdJ V3 public TV display, Roland-Garros layout
     =====================================================================
     Standalone HTML for the playing-hall TV / tablet. NO authentication.
     Reads the public feed at /api/public/dj/:tournoi_id/feed every 5s.

     Layout (full-screen grid):
       header
       main : 3 columns — POULES | PHASE FINALE | CONSOLANTE
       footer : progress bar + next matches with table numbers
     ===================================================================== */
  :root {
    --bg: #0d1117;
    --bg-card: #161b22;
    --bg-card-busy: #2a1212;
    --bg-card-finished: #102a17;
    --bg-card-pending: #131922;
    --border: #30363d;
    --border-busy: #ff4d4d;
    --border-finished: #2ea043;
    --border-pending: #444c56;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f0a020;
    --score-blue: #58a6ff;
    --score-green: #56d364;
    --score-red: #ff7b72;
    /* Auto-scaling font baseline — clamp keeps things readable from 24"
       laptop to 65" TV without ever spilling outside the viewport. */
    --fs-base: clamp(12px, 0.95vw, 18px);
    --fs-h1:   clamp(20px, 1.8vw, 34px);
    --fs-h2:   clamp(13px, 0.95vw, 18px);
    --fs-name: clamp(13px, 0.95vw, 18px);
    --fs-score: clamp(15px, 1.3vw, 24px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; width: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    font-size: var(--fs-base);
  }

  .frame {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    padding: 14px 18px;
    gap: 12px;
  }

  /* ---- HEADER ---- */
  header.top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px 10px 4px;
    border-bottom: 2px solid var(--accent);
  }
  header.top h1 { font-size: var(--fs-h1); color: var(--accent); font-weight: 800; }
  header.top .meta { color: var(--muted); font-size: var(--fs-h2); margin-top: 2px; }
  header.top .right { text-align: right; }
  header.top .clock { font-size: var(--fs-h1); font-variant-numeric: tabular-nums; color: var(--text); }
  header.top .ddj { font-size: var(--fs-h2); color: var(--muted); }
  header.top .ddj strong { color: var(--text); }

  /* ---- MAIN GRID — 3 COLUMNS ---- */
  .main {
    display: grid;
    grid-template-columns: 1.7fr 1.3fr 1.2fr;
    gap: 14px;
    overflow: hidden;
    min-height: 0;
  }
  @media (max-width: 1100px) {
    .main { grid-template-columns: 1fr; overflow: auto; }
  }
  .col {
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
    overflow: hidden;
  }
  .col-title {
    font-size: var(--fs-h2);
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--accent);
    border-bottom: 1px dashed var(--border);
    padding-bottom: 4px;
    flex-shrink: 0;
  }
  .col-body {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* ---- POULE CARD ---- */
  .poule {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }
  .poule-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
  }
  .poule-head .pname {
    font-weight: 800;
    color: var(--text);
    font-size: var(--fs-name);
    letter-spacing: 0.5px;
  }
  .poule-head .ptable {
    color: var(--muted);
    font-size: var(--fs-h2);
  }
  .poule-head .ptable strong { color: var(--accent); }

  .classement {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .crow {
    display: grid;
    grid-template-columns: 18px 1fr auto;
    gap: 8px;
    font-size: var(--fs-name);
    align-items: center;
    color: var(--text);
  }
  .crow .pos {
    color: var(--accent);
    font-weight: 700;
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  .crow .stats {
    color: var(--muted);
    font-variant-numeric: tabular-nums;
    font-size: 0.9em;
  }

  .matches {
    display: flex;
    flex-direction: column;
    gap: 4px;
    border-top: 1px dashed var(--border);
    padding-top: 6px;
  }
  .match-row {
    display: grid;
    grid-template-columns: 22px 1fr auto auto;
    gap: 8px;
    align-items: center;
    font-size: calc(var(--fs-name) * 0.92);
    padding: 3px 6px;
    border-radius: 6px;
  }
  .match-row.finished { color: var(--muted); }
  .match-row.pending { color: var(--text); }
  .match-row.in_progress {
    background: var(--bg-card-busy);
    border: 1px solid var(--border-busy);
    color: var(--text);
    font-weight: 700;
    animation: pulse 2s ease-in-out infinite;
  }
  .match-row .icon {
    font-size: 1em;
    text-align: center;
  }
  .match-row .players { color: var(--text); }
  .match-row .players .winner {
    color: var(--score-green);
    font-weight: 800;
  }
  .match-row .players .loser {
    color: var(--muted);
  }
  .match-row .pscore {
    font-variant-numeric: tabular-nums;
    color: var(--score-green);
    font-weight: 700;
  }
  .match-row .pscore .winner-score { color: var(--score-green); font-weight: 800; }
  .match-row .pscore .loser-score  { color: var(--muted); }
  .match-row .ptable {
    color: var(--accent);
    font-size: 0.85em;
    font-weight: 600;
  }
  .match-row.in_progress .ptable { color: var(--score-red); }
  .live-badge {
    display: inline-block;
    background: var(--border-busy);
    color: white;
    font-size: 0.75em;
    padding: 1px 6px;
    border-radius: 8px;
    font-weight: 800;
    letter-spacing: 0.5px;
    margin-left: 4px;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.4); }
    50%      { box-shadow: 0 0 12px 2px rgba(255, 77, 77, 0.55); }
  }

  /* ---- BRACKET (Roland-Garros style) ---- */
  /* V 2.0.724 — flex-based layout (replaces the grid-area approach
     of V714-V723 which mis-sized columns on iPad). Three flex children:
     SF column (left, 1fr), connector strip (60px fixed), F column
     (right, 1fr). Connector lines use absolute positioning relative
     to the connector strip with known dimensions, so they reach the
     adjacent cards reliably across all viewports. */
  .bracket {
    flex: 1;
    display: flex;
    align-items: stretch;
    gap: 0;
    min-height: 0;
  }
  /* V 2.0.727 — SF cards keep their natural content height (no longer
     stretched to fill 50% of the column) so they don't visually
     dominate the Finale. justify-content: space-around centers each
     SF inside its half, which mathematically places their vertical
     centers at exactly 25% / 75% — same as the connector horizontals,
     so alignment is preserved. */
  .b-col-sf {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    min-width: 0;
  }
  .b-col-sf .bmatch { flex: 0 0 auto; }
  .b-col-conn {
    width: 60px;
    position: relative;
    flex-shrink: 0;
  }
  /* Two horizontal lines (one per SF center) + a vertical bar on the
     right side joining them. Lines extend by -6px on each side so they
     overlap the SF cards (left) and F card (right) for a clean join. */
  .b-col-conn::before,
  .b-col-conn::after {
    content: '';
    position: absolute;
    height: 3px;
    left: -6px;
    right: -6px;
    background: var(--border-pending);
  }
  .b-col-conn::before { top: 25%; }   /* aligned with SF1 vertical center */
  .b-col-conn::after  { top: 75%; }   /* aligned with SF2 vertical center */
  .b-col-conn .b-vert {
    position: absolute;
    width: 3px;
    background: var(--border-pending);
    right: -6px;
    top: 25%;
    bottom: 25%;
  }
  /* V 2.0.728 — Right column now stacks F (top) and PF (bottom).
     justify-content: space-around centers F at 25% and PF at 75% —
     same vertical positions as SF1 and SF2 in the left column, so
     the existing connector horizontals at top:25% / top:75% reach
     each pair naturally. */
  .b-col-f {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    align-items: center;
    min-width: 0;
  }
  .b-pf-wrap {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .b-pf-wrap .b-pf-label {
    font-size: 0.85em;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: center;
    margin-bottom: 0;
  }
  .b-pf-wrap .bmatch {
    width: 100%;
    font-size: 0.92em;
    min-height: 70px;
  }
  /* V 2.0.726/727 — Finale is the focal point of the bracket: larger
     padding, bigger fonts, generous min-height (so it now reads as
     the biggest card on the bracket once SFs are at natural height),
     and a subtle glow to make it visually dominant. */
  .b-col-f .bmatch {
    flex: 1 1 auto;
    width: 100%;
    padding: 18px 18px;
    border-width: 3px;
    min-height: 130px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
  }
  .b-col-f .bmatch .bphase { font-size: 0.95em; }
  .b-col-f .bmatch .bp-line { font-size: 1.15em; }
  .b-col-f .bmatch .bp-score { font-size: 1.3em; }

  /* Champion celebration — gold border + glow once the Finale is played. */
  .b-col-f .bmatch.finished {
    border-color: #f5c542;
    background: linear-gradient(135deg, #2a1f08 0%, #1b1308 100%);
    box-shadow:
      0 0 0 1px rgba(245, 197, 66, 0.35),
      0 6px 24px rgba(245, 197, 66, 0.25);
  }
  .b-col-f .bmatch.finished .bp-line.winner .bp-name { color: #ffd966; }
  .b-col-f .bmatch.finished .bp-line.winner .bp-score { color: #ffd966; }
  .b-col-f .bmatch.finished .bphase { color: #f5c542; }

  /* SF cards stay readable but visually subordinate to the Finale. */
  .b-col-sf .bmatch { font-size: 0.92em; }

  /* V 2.0.728 — old .b-pf / .b-pf .b-pf-label rules removed: the
     petite finale now lives inside the bracket flex (.b-pf-wrap inside
     .b-col-f) so the standalone-block styles are no longer needed. */

  .bmatch {
    background: var(--bg-card);
    border: 2px solid var(--border-pending);
    border-radius: 10px;
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 4px;
    min-height: 70px;
  }
  .bmatch.finished  { border-color: var(--border-finished); background: var(--bg-card-finished); }
  .bmatch.in_progress { border-color: var(--border-busy); background: var(--bg-card-busy); animation: pulse 2s ease-in-out infinite; }
  .bmatch.empty { opacity: 0.55; border-style: dashed; }
  .bmatch .bphase {
    font-size: 0.78em;
    color: var(--muted);
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    justify-content: space-between;
  }
  .bmatch .bphase .btable { color: var(--accent); }
  /* V 2.0.729 — bp-line uses flex with margin-left:auto on the score
     so the score always sits at the right edge regardless of how many
     items precede it (name, medal, poule). The name is the only
     shrinkable item; medal and poule never shrink so they stay visible
     on narrow cards (notably the petite finale). */
  .bmatch .bp-line {
    display: flex;
    align-items: baseline;
    font-size: var(--fs-name);
    color: var(--text);
    gap: 6px;
  }
  .bmatch .bp-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
    flex: 0 1 auto;
  }
  .bmatch .bp-medal { flex: 0 0 auto; font-size: 0.95em; }
  .bmatch .bp-score { margin-left: auto; flex: 0 0 auto; }
  .bmatch .bp-poule {
    color: var(--muted);
    font-size: 0.78em;
    flex: 0 0 auto;
  }
  .bmatch .bp-line.winner .bp-name { color: var(--score-green); font-weight: 800; }
  .bmatch .bp-line.loser  .bp-name { color: var(--muted); }
  .bmatch .bp-score {
    font-variant-numeric: tabular-nums;
    font-weight: 800;
    font-size: var(--fs-score);
    color: var(--score-green);
  }
  .bmatch .bp-line.loser .bp-score { color: var(--muted); }
  .bmatch.empty .bp-line .bp-name { color: var(--muted); font-style: italic; }
  .bmatch.empty .bp-score { display: none; }

  .bracket-empty,
  .conso-empty {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: var(--fs-h2);
    text-align: center;
    padding: 20px;
    border: 1px dashed var(--border);
    border-radius: 10px;
  }

  /* ---- CONSOLANTE (simple stacked list of matches) ---- */
  .conso-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
    flex: 1;
    min-height: 0;
  }

  /* ---- FOOTER ---- */
  footer.bottom {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 18px;
    align-items: center;
    padding: 10px 12px 4px 12px;
    border-top: 1px solid var(--border);
  }
  footer.bottom .qlabel {
    font-size: var(--fs-h2);
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    font-weight: 800;
  }
  footer.bottom .qlist {
    display: flex;
    gap: 22px;
    overflow: hidden;
    font-size: var(--fs-h2);
    color: var(--text);
  }
  footer.bottom .qitem { white-space: nowrap; }
  footer.bottom .qitem .qmeta { color: var(--muted); margin-left: 6px; }
  footer.bottom .qitem .qtable {
    color: var(--accent);
    font-weight: 700;
    margin-left: 6px;
  }
  footer.bottom .progress {
    width: 240px;
    height: 22px;
    background: var(--bg-card);
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid var(--border);
    position: relative;
  }
  footer.bottom .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #2ea043, #56d364);
    transition: width 0.5s ease-out;
  }
  footer.bottom .progress-label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: white;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }

  /* ---- EMPTY STATE ---- */
  .full-empty {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: var(--fs-h1);
    text-align: center;
    gap: 14px;
  }
  .full-empty img { height: 80px; opacity: 0.4; }

  .error {
    color: var(--score-red);
    text-align: center;
    padding: 40px;
    font-size: var(--fs-h2);
  }
</style>
</head>
<body>
<div class="frame" id="frame">
  <header class="top">
    <div>
      <h1 id="t-name">Chargement…</h1>
      <div class="meta" id="t-meta"></div>
    </div>
    <div class="right">
      <div class="clock" id="t-clock"></div>
      <div class="ddj" id="t-ddj"></div>
    </div>
  </header>

  <div class="main" id="t-main">
    <div class="full-empty">
      <img src="images/FrenchBillard-Icon-small.png" alt="">
      <div>En attente de démarrage…</div>
    </div>
  </div>

  <footer class="bottom" id="t-footer" style="display:none;">
    <div class="qlabel">Prochains matchs</div>
    <div class="qlist" id="t-qlist"></div>
    <div class="progress">
      <div class="progress-fill" id="t-pfill" style="width:0%"></div>
      <div class="progress-label" id="t-plabel">0 / 0</div>
    </div>
  </footer>
</div>

<script>
  // -------------------------------------------------------------------
  // V 2.0.704 — DdJ V3 public TV polling, Roland-Garros layout
  // -------------------------------------------------------------------
  const params = new URLSearchParams(window.location.search);
  const tournoiId = parseInt(params.get('id'), 10);
  const POLL_MS = 5000;

  const $ = (id) => document.getElementById(id);
  const escapeHtml = (s) => String(s == null ? '' : s)
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');

  function fmtClock() {
    const d = new Date();
    return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
  }
  function fmtDate(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleDateString('fr-FR', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });
    } catch { return ''; }
  }
  function fmtTimeShort(iso) {
    if (!iso) return '';
    try {
      return new Date(iso).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
    } catch { return ''; }
  }

  function tickClock() { $('t-clock').textContent = fmtClock(); }
  setInterval(tickClock, 1000);
  tickClock();

  if (!Number.isFinite(tournoiId)) {
    $('t-main').innerHTML = '<div class="error">URL invalide. Format attendu : /dj-public.html?id=&lt;tournoiId&gt;</div>';
  } else {
    poll();
    setInterval(poll, POLL_MS);
  }

  async function poll() {
    try {
      const r = await fetch(`/api/public/dj/${tournoiId}/feed`, { cache: 'no-store' });
      if (!r.ok) {
        if (r.status === 404) {
          $('t-main').innerHTML = '<div class="error">Tournoi introuvable.</div>';
        }
        return;
      }
      const data = await r.json();
      render(data);
    } catch (err) {
      console.error('feed error', err);
    }
  }

  // ----------------------------------------------------------------
  // V 2.0.728 — Medals on top 3 once Finale + Petite Finale are played.
  // _currentMedals is rebuilt before each render() and consulted by
  // renderPoule() and renderBmatch() to append 🥇/🥈/🥉 after names.
  // ----------------------------------------------------------------
  let _currentMedals = {};
  function computeMedals(bracket) {
    _currentMedals = {};
    if (!bracket || !bracket.phases) return;
    const byPhase = {};
    for (const ph of bracket.phases) byPhase[ph.phase] = ph;
    const f = byPhase['F'];
    const pf = byPhase['PF'];
    if (f && f.status === 'finished' && f.p1_name && f.p2_name &&
        f.p1_points != null && f.p2_points != null) {
      if (f.p1_points > f.p2_points) {
        _currentMedals[f.p1_name] = '🥇';
        _currentMedals[f.p2_name] = '🥈';
      } else if (f.p2_points > f.p1_points) {
        _currentMedals[f.p2_name] = '🥇';
        _currentMedals[f.p1_name] = '🥈';
      }
    }
    if (pf && pf.status === 'finished' && pf.p1_name && pf.p2_name &&
        pf.p1_points != null && pf.p2_points != null) {
      if (pf.p1_points > pf.p2_points) _currentMedals[pf.p1_name] = '🥉';
      else if (pf.p2_points > pf.p1_points) _currentMedals[pf.p2_name] = '🥉';
    }
  }
  function medalFor(name) {
    return name && _currentMedals[name] ? ' ' + _currentMedals[name] : '';
  }

  // ----------------------------------------------------------------
  // Render
  // ----------------------------------------------------------------
  function render(data) {
    computeMedals(data.bracket);
    // Header
    $('t-name').textContent = (data.tournament && data.tournament.name) || 'Tournoi';
    const meta = data.tournament || {};
    $('t-meta').innerHTML = [
      meta.date ? fmtDate(meta.date) : '',
      meta.location ? `· ${escapeHtml(meta.location)}` : ''
    ].filter(Boolean).join(' ');
    $('t-ddj').innerHTML = data.session && data.session.ddj_name
      ? `Directeur de Jeu : <strong>${escapeHtml(data.session.ddj_name)}</strong>`
      : '';

    // Empty state — no session yet
    if (!data.session || !data.poules || data.poules.length === 0) {
      $('t-main').innerHTML = `
        <div class="full-empty">
          <img src="images/FrenchBillard-Icon-small.png" alt="">
          <div>En attente du démarrage de la journée…</div>
        </div>`;
      $('t-footer').style.display = 'none';
      return;
    }

    // Build the 3-column layout
    $('t-main').innerHTML = `
      <div class="col">
        <div class="col-title">Poules</div>
        <div class="col-body">${(data.poules || []).map(renderPoule).join('')}</div>
      </div>
      <div class="col">
        <div class="col-title">Phase finale</div>
        <div class="col-body">${renderBracket(data.bracket)}</div>
      </div>
      <div class="col">
        <div class="col-title">Matchs de classement</div>
        <div class="col-body">${renderConsolante(data.consolante)}</div>
      </div>`;

    // Footer — upcoming + progress
    $('t-footer').style.display = 'grid';
    const queue = data.upcoming || [];
    $('t-qlist').innerHTML = queue.length > 0
      ? queue.map(q => {
          const tbl = q.table_number ? `<span class="qtable">T${q.table_number}</span>` : '';
          return `<div class="qitem">${escapeHtml(q.p1_name)} vs ${escapeHtml(q.p2_name)}<span class="qmeta">Poule ${q.poule_number}</span>${tbl}</div>`;
        }).join('')
      : '<div class="qitem" style="color:var(--muted)">Aucun match en attente</div>';

    const pct = (data.progress && data.progress.percent) || 0;
    $('t-pfill').style.width = pct + '%';
    $('t-plabel').textContent = `${data.progress.done} / ${data.progress.total}  (${pct}%)`;
  }

  // ---- POULE ----
  function renderPoule(p) {
    const classement = (p.players || []).map(pl => `
      <div class="crow">
        <span class="pos">${pl.position}.</span>
        <span class="name">${escapeHtml(pl.name)}${medalFor(pl.name)}</span>
        <span class="stats">${pl.wins}-${pl.losses}${pl.draws ? '-' + pl.draws : ''}</span>
      </div>`).join('');

    const matches = (p.matches || []).map(renderPouleMatch).join('');

    const tableLbl = p.table_number ? `Table <strong>${p.table_number}</strong>` : '';
    return `
      <div class="poule">
        <div class="poule-head">
          <div class="pname">Poule ${p.number}</div>
          <div class="ptable">${tableLbl}</div>
        </div>
        <div class="classement">${classement}</div>
        <div class="matches">${matches}</div>
      </div>`;
  }

  function renderPouleMatch(m) {
    const icon = m.status === 'finished' ? '✓' : (m.status === 'in_progress' ? '🔴' : '•');
    // V 2.0.705 — bold-green the winner, dim the loser when the match is
    // finished. Tie → both stay neutral.
    let p1cls = '', p2cls = '', s1cls = '', s2cls = '';
    if (m.status === 'finished' && m.p1_points != null && m.p2_points != null) {
      if (m.p1_points > m.p2_points)      { p1cls = 'winner'; p2cls = 'loser'; s1cls = 'winner-score'; s2cls = 'loser-score'; }
      else if (m.p2_points > m.p1_points) { p2cls = 'winner'; p1cls = 'loser'; s2cls = 'winner-score'; s1cls = 'loser-score'; }
    }
    const players = `<span class="${p1cls}">${escapeHtml(m.p1_name)}</span> vs <span class="${p2cls}">${escapeHtml(m.p2_name)}</span>`;
    let scoreCell = '';
    if (m.status === 'finished') {
      scoreCell = `<span class="pscore"><span class="${s1cls}">${m.p1_points ?? '—'}</span> — <span class="${s2cls}">${m.p2_points ?? '—'}</span></span>`;
    } else if (m.status === 'in_progress') {
      scoreCell = `<span class="live-badge">LIVE</span>`;
    }
    const tableCell = m.table_number ? `<span class="ptable">T${m.table_number}</span>` : '';
    return `
      <div class="match-row ${m.status}">
        <span class="icon">${icon}</span>
        <span class="players">${players}</span>
        ${scoreCell}
        ${tableCell}
      </div>`;
  }

  // ---- BRACKET ----
  function renderBracket(b) {
    if (!b || !b.phases || b.phases.length === 0 || !b.available) {
      return `<div class="bracket-empty">En attente de la fin des poules…</div>`;
    }
    const byPhase = {};
    for (const ph of b.phases) byPhase[ph.phase] = ph;
    const sf1 = byPhase['SF1'];
    const sf2 = byPhase['SF2'];
    const f   = byPhase['F'];
    const pf  = byPhase['PF'];
    // V 2.0.728 — Petite finale moved INSIDE the bracket (right column,
     // below F). With justify-content: space-around on .b-col-f, F lands
     // at vertical center 25% and PF at 75% — exactly where the existing
     // connector horizontals are positioned, so PF gets a connector "for
     // free" without adding any new geometry.
    // V 2.0.729 — Medals only on the podium-deciding cards (Finale +
     // Petite Finale). SF cards stay clean: a SF winner who later wins
     // the F shouldn't show 🥇 in their SF cell (misleading — the SF
     // didn't decide gold).
    return `
      <div class="bracket">
        <div class="b-col-sf">
          ${renderBmatch(sf1, '½ Finale 1', { showMedals: false })}
          ${renderBmatch(sf2, '½ Finale 2', { showMedals: false })}
        </div>
        <div class="b-col-conn"><div class="b-vert"></div></div>
        <div class="b-col-f">
          ${renderBmatch(f, 'Finale')}
          <div class="b-pf-wrap">
            <div class="b-pf-label">Petite finale (3ᵉ place)</div>
            ${renderBmatch(pf, 'Petite finale')}
          </div>
        </div>
      </div>`;
  }

  function renderBmatch(m, label, opts) {
    const showMedals = !opts || opts.showMedals !== false;
    if (!m) return `<div class="bmatch empty"><div class="bphase">${escapeHtml(label)}</div><div class="bp-line"><span class="bp-name">à venir</span></div></div>`;
    const empty = !m.p1_name || !m.p2_name;
    const cls = empty ? 'empty' : (m.status || 'pending');
    const tableLbl = m.table_number ? `<span class="btable">T${m.table_number}</span>` : '';
    const phaseLbl = `<span>${escapeHtml(label)}</span>${tableLbl}`;
    const scoreL = m.status === 'finished' ? (m.p1_points ?? '') : '';
    const scoreR = m.status === 'finished' ? (m.p2_points ?? '') : '';
    const live = m.status === 'in_progress' ? '<span class="live-badge">LIVE</span>' : '';
    // V 2.0.705 — winner/loser classes when the match is finished
    let p1Line = '', p2Line = '';
    if (m.status === 'finished' && m.p1_points != null && m.p2_points != null) {
      if (m.p1_points > m.p2_points)      { p1Line = 'winner'; p2Line = 'loser'; }
      else if (m.p2_points > m.p1_points) { p2Line = 'winner'; p1Line = 'loser'; }
    }
    // V 2.0.729 — medal kept in its own span (outside .bp-name) so it
     // never gets ellipsised when the card is narrow. .bp-poule moves
     // out for the same reason.
    const p1Medal = (m.p1_name && showMedals) ? medalFor(m.p1_name) : '';
    const p2Medal = (m.p2_name && showMedals) ? medalFor(m.p2_name) : '';
    const p1Name = m.p1_name ? escapeHtml(m.p1_name) : '<em>?</em>';
    const p2Name = m.p2_name ? escapeHtml(m.p2_name) : '<em>?</em>';
    const p1Poule = m.p1_name && m.p1_poule ? `<span class="bp-poule">P${m.p1_poule}</span>` : '';
    const p2Poule = m.p2_name && m.p2_poule ? `<span class="bp-poule">P${m.p2_poule}</span>` : '';
    const renderLine = (cls, name, medal, poule, score) => `
      <div class="bp-line ${cls}">
        <span class="bp-name">${name}</span>
        ${medal ? `<span class="bp-medal">${medal}</span>` : ''}
        ${poule}
        ${score !== '' ? `<span class="bp-score">${score}</span>` : ''}
      </div>`;
    return `
      <div class="bmatch ${cls}">
        <div class="bphase">${phaseLbl}${live ? ' ' + live : ''}</div>
        ${renderLine(p1Line, p1Name, p1Medal, p1Poule, scoreL)}
        ${renderLine(p2Line, p2Name, p2Medal, p2Poule, scoreR)}
      </div>`;
  }

  // ---- CONSOLANTE ----
  function renderConsolante(c) {
    if (!c || !c.phases || c.phases.length === 0 || !c.available) {
      return `<div class="conso-empty">En attente de la fin des poules…</div>`;
    }
    // V 2.0.722 — Use the FFB place label ("Place 09", "Places 11-12")
    // exactly like the admin app. Falls back to the internal phase code
    // (QF1, SF1, …) only if the backend hasn't sent ffb_label.
    return `<div class="conso-list">${c.phases.map(ph => renderBmatch(ph, ph.ffb_label || ph.phase)).join('')}</div>`;
  }
</script>
</body>
</html>
