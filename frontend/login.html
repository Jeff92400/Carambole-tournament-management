<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - CDB Tournois</title>
  <link rel="icon" type="image/png" href="images/FrenchBillard-Icon-small.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(-45deg, #5e72e4, #825ee4, #667eea, #4c6ef5);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      padding: 20px;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 440px;
      box-shadow:
        0 8px 32px 0 rgba(31, 38, 135, 0.37),
        0 24px 64px 0 rgba(0, 0, 0, 0.15),
        inset 0 1px 0 0 rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 16px;
      font-weight: 600;
      color: #4a5568;
      margin-top: 8px;
    }

    .caption {
      font-size: 14px;
      font-weight: 500;
      color: #718096;
      margin-top: 4px;
    }

    .error {
      background: linear-gradient(135deg, #fff5f5 0%, #fed7d7 100%);
      border: 1px solid #fc8181;
      color: #c53030;
      padding: 14px 16px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 4px 12px rgba(252, 129, 129, 0.15);
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      border: 2px solid #e2e8f0;
      border-radius: 12px;
      background: #ffffff;
      color: #1a202c;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
      font-family: inherit;
    }

    .form-group input:focus {
      border-color: #667eea;
      box-shadow:
        0 0 0 4px rgba(102, 126, 234, 0.1),
        0 4px 12px rgba(102, 126, 234, 0.15);
      transform: translateY(-1px);
    }

    .form-group input::placeholder {
      color: #a0aec0;
    }

    .btn-submit {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow:
        0 4px 16px rgba(102, 126, 234, 0.4),
        0 8px 24px rgba(102, 126, 234, 0.2);
      margin-top: 8px;
      letter-spacing: 0.5px;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow:
        0 8px 24px rgba(102, 126, 234, 0.5),
        0 16px 40px rgba(102, 126, 234, 0.3);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .forgot-link {
      display: block;
      text-align: center;
      margin-top: 24px;
      color: #667eea;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .forgot-link:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
    }

    .version {
      color: #1a202c;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .copyright {
      color: #2d3748;
      font-size: 10px;
      line-height: 1.6;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 36px 28px;
      }

      .logo {
        width: 60px;
        height: 60px;
      }

      .title {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="header">
      <div class="logo-container">
        <img id="app-header-icon" src="images/FrenchBillard-Icon-small.png" alt="Logo" class="logo" onerror="this.src='images/FrenchBillard-Icon-small.png';">
      </div>
      <h1 class="title" id="app-org-name">CDB</h1>
      <p class="subtitle">Gestion Des Compétitions de Billard Français</p>
      <p class="caption">(Carambole)</p>
    </div>

    <div id="errorMessage" class="error" style="display: none;"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="username">Nom d'utilisateur</label>
        <input type="text" id="username" name="username" required autofocus autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn-submit">Se connecter</button>
    </form>

    <a id="forgot-password-link" href="forgot-password.html" class="forgot-link">Mot de passe oublié ?</a>

    <div class="footer">
      <div class="version">V 2.0.472 04/26</div>
      <div class="copyright">
        © 2025-26 Jeff R. Tous droits réservés.<br>
        Logiciel Kayros protégé – Dépôt APP n°IDDN.FR.001.130044.000.S.P.2026.000.42000.
      </div>
    </div>
  </div>

  <script src="js/app-branding.js?v=216"></script>
  <script>
    const API_URL = '/api';

    // Initialize branding based on context
    const initOrgSlug = new URLSearchParams(window.location.search).get('org');
    const isSaLogin = new URLSearchParams(window.location.search).get('sa') === '1';
    if (isSaLogin) {
      // Neutral platform branding for SA login
      document.getElementById('app-org-name').textContent = 'Plateforme FFB';
      document.getElementById('app-header-icon').src = 'images/FFB.png';
      document.title = 'Connexion - Super Admin';
    } else {
      initPublicBranding(initOrgSlug);
    }

    // Pass org context to forgot-password link
    if (initOrgSlug) {
      const forgotLink = document.getElementById('forgot-password-link');
      if (forgotLink) {
        forgotLink.href = 'forgot-password.html?org=' + encodeURIComponent(initOrgSlug);
      }
    }

    // Show session expired message if present
    const sessionExpiredMessage = sessionStorage.getItem('sessionExpiredMessage');
    if (sessionExpiredMessage) {
      const errorDiv = document.getElementById('errorMessage');
      errorDiv.textContent = sessionExpiredMessage;
      errorDiv.style.display = 'block';
      errorDiv.style.background = '#fff3cd';
      errorDiv.style.borderColor = '#ffc107';
      errorDiv.style.color = '#856404';
      sessionStorage.removeItem('sessionExpiredMessage');
    }

    // Force fresh login when org context has changed
    const urlParams = new URLSearchParams(window.location.search);
    const orgSlug = urlParams.get('org');
    const storedOrgId = sessionStorage.getItem('organizationId');
    // Clear session when:
    // 1. ?org= is present (switching to a specific CDB)
    // 2. No ?org= but session is for a non-default org (returning to default CDBHS)
    if (orgSlug || (storedOrgId && storedOrgId !== '1' && storedOrgId !== 'null' && storedOrgId !== 'undefined')) {
      sessionStorage.removeItem('token');
      sessionStorage.removeItem('userRole');
      sessionStorage.removeItem('username');
      sessionStorage.removeItem('organizationId');
      sessionStorage.removeItem('isSuperAdmin');
      sessionStorage.removeItem('ligueNumero');
      sessionStorage.removeItem('userClub');
      sessionStorage.removeItem('userClubId');
    }

    // Check if already logged in
    const token = sessionStorage.getItem('token');
    if (token) {
      // Verify token is still valid
      fetch(`${API_URL}/auth/me`, {
        headers: { 'Authorization': `Bearer ${token}` }
      }).then(res => {
        if (res.ok) {
          if (isSaLogin) {
            window.location.href = 'super-admin.html';
          } else if (sessionStorage.getItem('userRole') === 'ligue_admin') {
            window.location.href = 'ligue-dashboard.html';
          } else if (sessionStorage.getItem('userRole') === 'directeur_jeu') {
            window.location.href = 'directeur-de-jeu.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        } else {
          sessionStorage.removeItem('token');
          sessionStorage.removeItem('userRole');
          sessionStorage.removeItem('username');
        }
      }).catch(() => {});
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMessage');

      try {
        const response = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password, orgSlug: orgSlug || undefined })
        });

        const data = await response.json();

        if (response.ok) {
          sessionStorage.setItem('token', data.token);
          sessionStorage.setItem('userRole', data.user.role);
          sessionStorage.setItem('username', data.user.username || username);
          sessionStorage.setItem('userClub', data.user.club_name || '');
          sessionStorage.setItem('userClubId', data.user.club_id || '');
          sessionStorage.setItem('isSuperAdmin', data.user.is_super_admin ? 'true' : 'false');
          // Store organization info for multi-CDB support
          if (data.user.organization_id) {
            sessionStorage.setItem('organizationId', data.user.organization_id);
          }
          if (data.user.org_slug) {
            sessionStorage.setItem('orgSlug', data.user.org_slug);
          }
          // Store ligue info for ligue_admin
          if (data.user.ffb_ligue_numero) {
            sessionStorage.setItem('ligueNumero', data.user.ffb_ligue_numero);
          }
          // Mark active session in this tab (prevents stale org redirect in auth-utils.js)
          sessionStorage.setItem('activeOrgSession', 'true');
          // Redirect based on role and context
          if (isSaLogin && data.user.is_super_admin) {
            window.location.href = 'super-admin.html';
          } else if (data.user.role === 'ligue_admin') {
            window.location.href = 'ligue-dashboard.html';
          } else if (data.user.role === 'directeur_jeu') {
            window.location.href = 'directeur-de-jeu.html';
          } else {
            window.location.href = 'dashboard.html';
          }
        } else {
          errorDiv.textContent = data.error || 'Erreur de connexion';
          errorDiv.style.display = 'block';
        }
      } catch (error) {
        errorDiv.textContent = 'Erreur de connexion au serveur';
        errorDiv.style.display = 'block';
      }
    });
  </script>
</body>
</html>
